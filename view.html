<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>康录卡 - 患者健康档案</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
    .header h1 { font-size: 22px; margin-bottom: 5px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .container { padding: 20px; max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #333; border-left: 4px solid #667eea; padding-left: 10px; }
    .info-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: #888; font-size: 14px; }
    .info-value { color: #333; font-weight: 500; font-size: 14px; }
    .tag-item { display: inline-block; background: #e8f0fe; color: #667eea; padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-right: 8px; margin-bottom: 8px; }
    .record-item { padding: 15px; border-bottom: 1px solid #f5f5f5; }
    .record-item:last-child { border-bottom: none; }
    .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .record-title { font-weight: 600; color: #333; font-size: 15px; }
    .record-date { font-size: 12px; color: #999; }
    .record-desc { font-size: 13px; color: #666; line-height: 1.5; }
    .record-tag { display: inline-block; background: #e8f0fe; color: #667eea; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-top: 6px; }
    .empty-tip { color: #999; text-align: center; padding: 30px; font-size: 14px; }
    .loading { text-align: center; padding: 50px; color: #999; }
    .error { text-align: center; padding: 50px; color: #ff4d4f; }
    .notice { background: #fff7e6; border: 1px solid #ffd591; color: #d46b08; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>康录卡</h1>
    <p>患者健康档案查看</p>
  </div>
  
  <div class="container" id="container">
    <div class="loading">加载中...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yewemusfpujkmbznkwah.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlld2VtdXNmcHVqa21iem5rd2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTU5NDQsImV4cCI6MjA5NzgzMTk0NH0.1BPDHG3ug62b_myHsIkKVIWW1ZTmZRXZJSLEDHHgA8E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 从URL获取uid
    function getUidFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('uid');
    }

    async function loadPatientData() {
      const uid = getUidFromUrl();
      const container = document.getElementById('container');
      
      if (!uid) {
        container.innerHTML = '<div class="error">无效的二维码，缺少患者ID</div>';
        return;
      }

      try {
        // 查询profiles表（注意：这里需要uid完整格式，但二维码只存了前16位）
        // 所以我们需要查询所有用户，找到匹配前16位的
        const { data: profiles, error: profileError } = await supabaseClient
          .from('profiles')
          .select('*');
        
        if (profileError) throw profileError;

        // 找到匹配的用户
        const profile = profiles.find(p => p.id && p.id.startsWith(uid));
        
        if (!profile) {
          container.innerHTML = '<div class="error">未找到该患者档案</div>';
          return;
        }

        const fullUid = profile.id;

        // 查询就诊记录
        const { data: records, error: recordsError } = await supabaseClient
          .from('records')
          .select('*')
          .eq('user_id', fullUid)
          .order('record_date', { ascending: false });

        if (recordsError) throw recordsError;

        // 渲染页面
        renderPage(profile, records || []);
      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="error">加载失败：' + err.message + '</div>';
      }
    }

    function renderPage(profile, records) {
      const container = document.getElementById('container');
      
      const tagsHtml = profile.diseases 
        ? profile.diseases.split(',').map(d => `<span class="tag-item">${d.trim()}</span>`).join('')
        : '<span style="color:#999;">暂无</span>';

      const recordsHtml = records.length > 0
        ? records.map(r => `
          <div class="record-item">
            <div class="record-header">
              <span class="record-title">${escapeHtml(r.title || '未命名')}</span>
              <span class="record-date">${r.record_date || ''}</span>
            </div>
            <div class="record-desc">${escapeHtml(r.hospital || '')} ${escapeHtml(r.department || '')}</div>
            <div class="record-desc">${escapeHtml(r.description || '')}</div>
            ${r.department ? `<span class="record-tag">${escapeHtml(r.department)}</span>` : ''}
          </div>
        `).join('')
        : '<div class="empty-tip">暂无就诊记录</div>';

      container.innerHTML = `
        <div class="notice">
          <strong>隐私提示：</strong>本档案由患者授权展示，仅供医疗参考
        </div>
        
        <div class="card">
          <div class="card-title">基本信息</div>
          <div class="info-item">
            <span class="info-label">姓名</span>
            <span class="info-value">${profile.name || '--'}</span>
          </div>
          <div class="info-item">
            <span class="info-label">性别</span>
            <span class="info-value">${profile.gender || '--'}</span>
          </div>
          <div class="info-item">
            <span class="info-label">年龄</span>
            <span class="info-value">${profile.age || '--'}</span>
          </div>
          <div class="info-item">
            <span class="info-label">血型</span>
            <span class="info-value">${profile.blood_type || '--'}</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">慢病标签</div>
          <div>${tagsHtml}</div>
        </div>

        <div class="card">
          <div class="card-title">就诊记录（共 ${records.length} 条）</div>
          ${recordsHtml}
        </div>
      `;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 页面加载时执行
    loadPatientData();
  </script>
</body>
</html>
