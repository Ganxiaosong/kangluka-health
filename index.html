<script>
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let currentProfile = null;
let selectedImages = [];

function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('authMessage').innerHTML = '';
}

function showLogin() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('authMessage').innerHTML = '';
}

function showMainPage() {
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('userEmail').textContent = currentUser.email;
    document.getElementById('userAvatar').textContent = currentUser.email.charAt(0).toUpperCase();
    loadProfile();
    loadRecords();
    generateQRCode();
}

function showAuthPage() {
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('authPage').classList.remove('hidden');
    currentUser = null;
}

async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const msgDiv = document.getElementById('authMessage');
    
    if (!email || !password) { msgDiv.innerHTML = '<p class="error-msg">请填写完整信息</p>'; return; }
    if (password.length < 6) { msgDiv.innerHTML = '<p class="error-msg">密码至少6位</p>'; return; }
    if (password !== confirm) { msgDiv.innerHTML = '<p class="error-msg">两次密码不一致</p>'; return; }
    
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) { msgDiv.innerHTML = `<p class="error-msg">注册失败：${error.message}</p>`; }
    else { msgDiv.innerHTML = '<p class="success-msg">注册成功！请直接登录</p>'; setTimeout(showLogin, 1500); }
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('authMessage');
    
    if (!email || !password) { msgDiv.innerHTML = '<p class="error-msg">请填写邮箱和密码</p>'; return; }
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { msgDiv.innerHTML = `<p class="error-msg">登录失败：${error.message}</p>`; }
    else { currentUser = data.user; showMainPage(); }
}

async function handleLogout() {
    await supabase.auth.signOut();
    showAuthPage();
}

async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) { currentUser = session.user; showMainPage(); }
}

async function loadProfile() {
    const { data, error } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
    if (data) {
        currentProfile = data;
        document.getElementById('pName').textContent = data.name || '未填写';
        document.getElementById('pGender').textContent = data.gender || '未填写';
        document.getElementById('pAge').textContent = data.age ? data.age + '岁' : '未填写';
        document.getElementById('pBlood').textContent = data.blood_type || '未填写';
        if (data.blood_type) document.getElementById('pBlood').className = 'blood-type';
        document.getElementById('pHeight').textContent = data.height ? data.height + 'cm' : '未填写';
        document.getElementById('pWeight').textContent = data.weight ? data.weight + 'kg' : '未填写';
        document.getElementById('pAllergy').textContent = data.allergy || '未填写';
        document.getElementById('pHistory').textContent = data.medical_history || '未填写';
    }
}

function editProfile() {
    if (currentProfile) {
        document.getElementById('editName').value = currentProfile.name || '';
        document.getElementById('editGender').value = currentProfile.gender || '';
        document.getElementById('editAge').value = currentProfile.age || '';
        document.getElementById('editBlood').value = currentProfile.blood_type || '';
        document.getElementById('editHeight').value = currentProfile.height || '';
        document.getElementById('editWeight').value = currentProfile.weight || '';
        document.getElementById('editAllergy').value = currentProfile.allergy || '';
        document.getElementById('editHistory').value = currentProfile.medical_history || '';
    }
    openModal('profileModal');
}

async function saveProfile() {
    const msgDiv = document.getElementById('profileMessage');
    const profileData = {
        id: currentUser.id,
        name: document.getElementById('editName').value.trim(),
        gender: document.getElementById('editGender').value,
        age: parseInt(document.getElementById('editAge').value) || null,
        blood_type: document.getElementById('editBlood').value,
        height: parseInt(document.getElementById('editHeight').value) || null,
        weight: parseInt(document.getElementById('editWeight').value) || null,
        allergy: document.getElementById('editAllergy').value.trim(),
        medical_history: document.getElementById('editHistory').value.trim(),
        updated_at: new Date().toISOString()
    };
    
    const { error } = await supabase.from('profiles').upsert([profileData]);
    if (error) { msgDiv.innerHTML = `<p class="error-msg">保存失败：${error.message}</p>`; }
    else {
        msgDiv.innerHTML = '<p class="success-msg">保存成功！</p>';
        setTimeout(() => { closeModal('profileModal'); loadProfile(); }, 1000);
    }
}

function generateQRCode() {
    const shareUrl = `https://ganxiaosong.github.io/kangluka-health/doctor-view.html?patient=${currentUser.id}`;
    document.getElementById('shareLink').textContent = shareUrl;
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, { text: shareUrl, width: 180, height: 180, colorDark: '#667eea', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
}

function handleImageSelect(event) {
    const files = Array.from(event.target.files);
    files.forEach(file => {
        if (!file.type.startsWith('image/')) return;
        selectedImages.push(file);
        const reader = new FileReader();
        reader.onload = (e) => addImagePreview(e.target.result, selectedImages.length - 1);
        reader.readAsDataURL(file);
    });
}

function addImagePreview(src, index) {
    const grid = document.getElementById('imagePreviewGrid');
    const div = document.createElement('div');
    div.className = 'image-preview-item';
    div.innerHTML = `<img src="${src}" alt="预览"><button class="remove-btn" onclick="removeImage(${index})">×</button>`;
    grid.appendChild(div);
}

function removeImage(index) {
    selectedImages.splice(index, 1);
    refreshImagePreview();
}

function refreshImagePreview() {
    const grid = document.getElementById('imagePreviewGrid');
    grid.innerHTML = '';
    selectedImages.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = (e) => addImagePreview(e.target.result, i);
        reader.readAsDataURL(file);
    });
}

async function uploadImages() {
    if (selectedImages.length === 0) return [];
    const urls = [];
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('uploadProgress');
    progressContainer.classList.remove('hidden');
    
    for (let i = 0; i < selectedImages.length; i++) {
        const file = selectedImages[i];
        const fileName = `${currentUser.id}/${Date.now()}_${i}_${file.name}`;
        const { data, error } = await supabase.storage.from('medical-images').upload(fileName, file);
        
        if (error) { console.error('上传失败:', error); continue; }
        
        const { data: { publicUrl } } = supabase.storage.from('medical-images').getPublicUrl(fileName);
        urls.push(publicUrl);
        progressBar.style.width = `${((i + 1) / selectedImages.length) * 100}%`;
    }
    
    setTimeout(() => { progressContainer.classList.add('hidden'); progressBar.style.width = '0%'; }, 500);
    return urls;
}

document.getElementById('recordDate').valueAsDate = new Date();

function openRecordModal() {
    document.getElementById('editRecordId').value = '';
    document.getElementById('recordModalTitle').textContent = '添加就诊记录';
    document.getElementById('recordDate').valueAsDate = new Date();
    document.getElementById('hospital').value = '';
    document.getElementById('department').value = '';
    document.getElementById('diagnosis').value = '';
    document.getElementById('medication').value = '';
    document.getElementById('recordType').value = '门诊';
    document.getElementById('recordMessage').innerHTML = '';
    selectedImages = [];
    document.getElementById('imagePreviewGrid').innerHTML = '';
    document.getElementById('uploadProgress').classList.add('hidden');
    openModal('recordModal');
}

async function saveRecord() {
    const msgDiv = document.getElementById('recordMessage');
    const editId = document.getElementById('editRecordId').value;
    
    const imageUrls = await uploadImages();
    
    const recordData = {
        user_id: currentUser.id,
        date: document.getElementById('recordDate').value,
        hospital: document.getElementById('hospital').value.trim(),
        department: document.getElementById('department').value.trim(),
        diagnosis: document.getElementById('diagnosis').value.trim(),
        medication: document.getElementById('medication').value.trim(),
        type: document.getElementById('recordType').value,
        images: imageUrls.length > 0 ? JSON.stringify(imageUrls) : null
    };
    
    if (!recordData.date || !recordData.hospital || !recordData.department) {
        msgDiv.innerHTML = '<p class="error-msg">请填写就诊日期、医院和科室</p>';
        return;
    }
    
    let result;
    if (editId) {
        const { data: existing } = await supabase.from('records').select('images').eq('id', editId).single();
        const existingImages = existing?.images ? JSON.parse(existing.images) : [];
        recordData.images = JSON.stringify([...existingImages, ...imageUrls]);
        result = await supabase.from('records').update(recordData).eq('id', editId).select();
    } else {
        result = await supabase.from('records').insert([recordData]).select();
    }
    
    const { error } = result;
    if (error) { msgDiv.innerHTML = `<p class="error-msg">保存失败：${error.message}</p>`; }
    else {
        msgDiv.innerHTML = `<p class="success-msg">${editId ? '更新' : '保存'}成功！</p>`;
        selectedImages = [];
        setTimeout(() => { closeModal('recordModal'); loadRecords(); }, 1000);
    }
}

async function loadRecords() {
    const container = document.getElementById('recordsContainer');
    const { data, error } = await supabase.from('records').select('*').eq('user_id', currentUser.id).order('date', { ascending: false });
    
    if (error) { container.innerHTML = `<div class="error-msg">加载失败：${error.message}</div>`; return; }
    if (!data || data.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无就诊记录</p><p style="font-size:13px; margin-top:10px;">点击上方按钮添加第一条记录</p></div>`;
        return;
    }
    
    const typeClass = { '门诊': 'type-outpatient', '住院': 'type-inpatient', '体检': 'type-checkup' };
    
    container.innerHTML = '<div class="timeline">' + data.map(record => {
        let imagesHtml = '';
        if (record.images) {
            try {
                const imageUrls = JSON.parse(record.images);
                imagesHtml = '<div class="record-images">' + imageUrls.map((url, i) => 
                    `<img src="${url}" class="record-image-thumb" onclick="viewImage('${url}')" alt="检查图片${i+1}">`
                ).join('') + '</div>';
            } catch (e) {}
        }
        
        return `
        <div class="timeline-item">
            <div class="timeline-date">${record.date}</div>
            <div class="timeline-title">${escapeHtml(record.hospital)} · ${escapeHtml(record.department)}</div>
            <span class="timeline-type ${typeClass[record.type] || 'type-outpatient'}">${record.type || '门诊'}</span>
            <div class="timeline-content">
                ${record.diagnosis ? `<p><strong>诊断：</strong>${escapeHtml(record.diagnosis)}</p>` : ''}
                ${record.medication ? `<p><strong>用药：</strong>${escapeHtml(record.medication)}</p>` : ''}
            </div>
            ${imagesHtml}
            <div class="timeline-actions">
                <button onclick="editRecord('${record.id}')">编辑</button>
                <button class="delete" onclick="deleteRecord('${record.id}')">删除</button>
            </div>
        </div>`;
    }).join('') + '</div>';
}

function editRecord(id) {
    supabase.from('records').select('*').eq('id', id).single().then(({ data }) => {
        if (data) {
            document.getElementById('editRecordId').value = id;
            document.getElementById('recordModalTitle').textContent = '编辑就诊记录';
            document.getElementById('recordDate').value = data.date;
            document.getElementById('hospital').value = data.hospital;
            document.getElementById('department').value = data.department;
            document.getElementById('diagnosis').value = data.diagnosis || '';
            document.getElementById('medication').value = data.medication || '';
            document.getElementById('recordType').value = data.type || '门诊';
            selectedImages = [];
            document.getElementById('imagePreviewGrid').innerHTML = '';
            openModal('recordModal');
        }
    });
}

async function deleteRecord(id) {
    if (!confirm('确定要删除这条记录吗？')) return;
    const { error } = await supabase.from('records').delete().eq('id', id);
    if (!error) loadRecords();
}

function viewImage(url) {
    document.getElementById('viewerImage').src = url;
    document.getElementById('imageViewer').classList.add('active');
}

function closeImageViewer() {
    document.getElementById('imageViewer').classList.remove('active');
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });
});

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div'); div.textContent = text; return div.innerHTML;
}

const urlParams = new URLSearchParams(window.location.search);
const viewId = urlParams.get('view');
if (viewId) {
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.querySelector('.add-record-btn').style.display = 'none';
    document.querySelectorAll('.edit-btn').forEach(btn => btn.style.display = 'none');
    document.querySelectorAll('.timeline-actions').forEach(btn => btn.style.display = 'none');
    currentUser = { id: viewId };
    loadProfile();
    loadRecords();
} else {
    checkAuth();
}
</script>
