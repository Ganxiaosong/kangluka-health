<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康录卡 - 跨院慢病病史整合</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 14px; }
        
        .auth-box { max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #34495e; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #3498db; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: all 0.3s; margin-bottom: 10px; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #e67e22; }
        .btn-small { width: auto; padding: 6px 12px; font-size: 13px; margin: 0 5px 0 0; }
        
        .toggle-link { text-align: center; color: #3498db; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .toggle-link:hover { text-decoration: underline; }
        
        .hidden { display: none !important; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .user-info { color: #2c3e50; font-size: 14px; }
        .user-info span { color: #3498db; font-weight: bold; }
        
        .record-form { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .record-form h3 { margin-bottom: 15px; color: #2c3e50; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        
        .records-list { margin-top: 20px; }
        .record-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 12px; transition: box-shadow 0.3s; }
        .record-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .record-title { font-size: 16px; font-weight: bold; color: #2c3e50; }
        .record-date { color: #7f8c8d; font-size: 13px; }
        .record-body { color: #555; font-size: 14px; line-height: 1.6; }
        .record-body p { margin: 4px 0; }
        .record-body .label { color: #7f8c8d; display: inline-block; width: 60px; }
        .record-actions { margin-top: 10px; text-align: right; }
        
        .empty-state { text-align: center; padding: 40px; color: #7f8c8d; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 5px; }
        .success-msg { color: #27ae60; font-size: 13px; margin-top: 5px; }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
        .badge-outpatient { background: #e3f2fd; color: #1976d2; }
        .badge-inpatient { background: #fce4ec; color: #c2185b; }
        .badge-checkup { background: #e8f5e9; color: #388e3c; }
    </style>
</head>
<body>

<!-- 登录/注册页面 -->
<div id="authPage" class="auth-box">
    <h2 id="authTitle">用户登录</h2>
    <div id="loginForm">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="loginEmail" placeholder="请输入邮箱" value="">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" value="">
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">登录</button>
        <div class="toggle-link" onclick="showRegister()">还没有账号？立即注册</div>
    </div>
    
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="regEmail" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="regConfirm" placeholder="请再次输入密码">
        </div>
        <button class="btn btn-success" onclick="handleRegister()">注册</button>
        <div class="toggle-link" onclick="showLogin()">已有账号？立即登录</div>
    </div>
    <div id="authMessage"></div>
</div>

<!-- 主页面 -->
<div id="mainPage" class="container hidden">
    <div class="header">
        <div class="user-info">当前用户：<span id="userEmail"></span></div>
        <button class="btn btn-small btn-danger" onclick="handleLogout()" style="width:auto;">退出登录</button>
    </div>
    
    <h1>康录卡</h1>
    <p class="subtitle">跨院慢病病史整合记录系统</p>
    
    <!-- 添加/编辑记录表单 -->
    <div class="record-form">
        <h3 id="formTitle">添加就诊记录</h3>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label>就诊日期 *</label>
                <input type="date" id="recordDate">
            </div>
            <div class="form-group">
                <label>记录类型</label>
                <select id="recordType">
                    <option value="门诊">门诊</option>
                    <option value="住院">住院</option>
                    <option value="体检">体检</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>医院名称 *</label>
                <input type="text" id="hospital" placeholder="例如：北京协和医院">
            </div>
            <div class="form-group">
                <label>科室 *</label>
                <input type="text" id="department" placeholder="例如：心内科">
            </div>
        </div>
        <div class="form-group">
            <label>诊断结果</label>
            <textarea id="diagnosis" placeholder="请输入医生的诊断结果..."></textarea>
        </div>
        <div class="form-group">
            <label>用药记录</label>
            <textarea id="medication" placeholder="请输入用药名称、剂量、用法..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveRecord()" id="saveBtn">保存记录</button>
        <button class="btn btn-warning hidden" onclick="cancelEdit()" id="cancelBtn">取消编辑</button>
        <div id="formMessage"></div>
    </div>
    
    <!-- 记录列表 -->
    <div class="records-list">
        <h3>就诊记录列表</h3>
        <div id="recordsContainer">
            <div class="empty-state">暂无记录，请添加第一条就诊记录</div>
        </div>
    </div>
</div>

<script>
// ==================== 配置区（已配置好） ====================
const SUPABASE_URL = 'https://yewemusfpujkmbznkwah.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlld2VtdXNmcHVqa21iem5rd2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTU5NDQsImV4cCI6MjA5NzgzMTk0NH0.1BPDHG3ug62b_myHsIkKVIWW1ZTmZRXZJSLEDHHgA8E';

// 初始化 Supabase
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 当前用户
let currentUser = null;

// ==================== 页面切换 ====================
function showRegister() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('authTitle').textContent = '用户注册';
    document.getElementById('authMessage').innerHTML = '';
}

function showLogin() {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('authTitle').textContent = '用户登录';
    document.getElementById('authMessage').innerHTML = '';
}

function showMainPage() {
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('userEmail').textContent = currentUser.email;
    loadRecords();
}

function showAuthPage() {
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('authPage').classList.remove('hidden');
    currentUser = null;
}

// ==================== 认证功能 ====================
async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const msgDiv = document.getElementById('authMessage');
    
    if (!email || !password) {
        msgDiv.innerHTML = '<p class="error-msg">请填写完整信息</p>';
        return;
    }
    if (password.length < 6) {
        msgDiv.innerHTML = '<p class="error-msg">密码至少6位</p>';
        return;
    }
    if (password !== confirm) {
        msgDiv.innerHTML = '<p class="error-msg">两次密码不一致</p>';
        return;
    }
    
    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
    });
    
    if (error) {
        msgDiv.innerHTML = `<p class="error-msg">注册失败：${error.message}</p>`;
    } else {
        msgDiv.innerHTML = '<p class="success-msg">注册成功！请查看邮箱验证链接（如不需要验证可直接登录）</p>';
        setTimeout(showLogin, 2000);
    }
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('authMessage');
    
    if (!email || !password) {
        msgDiv.innerHTML = '<p class="error-msg">请填写邮箱和密码</p>';
        return;
    }
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });
    
    if (error) {
        msgDiv.innerHTML = `<p class="error-msg">登录失败：${error.message}</p>`;
    } else {
        currentUser = data.user;
        showMainPage();
    }
}

async function handleLogout() {
    await supabase.auth.signOut();
    showAuthPage();
}

// 检查是否已登录
async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        currentUser = session.user;
        showMainPage();
    }
}

// ==================== 记录操作 ====================
document.getElementById('recordDate').valueAsDate = new Date();

async function saveRecord() {
    const msgDiv = document.getElementById('formMessage');
    const editId = document.getElementById('editId').value;
    
    const recordData = {
        user_id: currentUser.id,
        date: document.getElementById('recordDate').value,
        hospital: document.getElementById('hospital').value.trim(),
        department: document.getElementById('department').value.trim(),
        diagnosis: document.getElementById('diagnosis').value.trim(),
        medication: document.getElementById('medication').value.trim(),
        type: document.getElementById('recordType').value
    };
    
    if (!recordData.date || !recordData.hospital || !recordData.department) {
        msgDiv.innerHTML = '<p class="error-msg">请填写就诊日期、医院和科室</p>';
        return;
    }
    
    let result;
    if (editId) {
        result = await supabase
            .from('records')
            .update(recordData)
            .eq('id', editId)
            .select();
    } else {
        result = await supabase
            .from('records')
            .insert([recordData])
            .select();
    }
    
    const { data, error } = result;
    
    if (error) {
        msgDiv.innerHTML = `<p class="error-msg">保存失败：${error.message}</p>`;
        console.error('保存错误详情:', error);
    } else {
        msgDiv.innerHTML = `<p class="success-msg">${editId ? '更新' : '保存'}成功！</p>`;
        clearForm();
        loadRecords();
        setTimeout(() => msgDiv.innerHTML = '', 3000);
    }
}

async function loadRecords() {
    const container = document.getElementById('recordsContainer');
    
    const { data, error } = await supabase
        .from('records')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('date', { ascending: false });
    
    if (error) {
        container.innerHTML = `<div class="empty-state" style="color:#e74c3c;">加载失败：${error.message}</div>`;
        return;
    }
    
    if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无记录，请添加第一条就诊记录</div>';
        return;
    }
    
    const typeBadge = {
        '门诊': 'badge-outpatient',
        '住院': 'badge-inpatient',
        '体检': 'badge-checkup'
    };
    
    container.innerHTML = data.map(record => `
        <div class="record-item">
            <div class="record-header">
                <div>
                    <span class="record-title">${escapeHtml(record.hospital)} - ${escapeHtml(record.department)}</span>
                    <span class="badge ${typeBadge[record.type] || 'badge-outpatient'}">${record.type || '门诊'}</span>
                </div>
                <span class="record-date">${record.date}</span>
            </div>
            <div class="record-body">
                ${record.diagnosis ? `<p><span class="label">诊断：</span>${escapeHtml(record.diagnosis)}</p>` : ''}
                ${record.medication ? `<p><span class="label">用药：</span>${escapeHtml(record.medication)}</p>` : ''}
            </div>
            <div class="record-actions">
                <button class="btn btn-small btn-primary" onclick="editRecord('${record.id}')">编辑</button>
                <button class="btn btn-small btn-danger" onclick="deleteRecord('${record.id}')">删除</button>
            </div>
        </div>
    `).join('');
}

function editRecord(id) {
    const record = document.querySelector(`button[onclick="editRecord('${id}')"]`).closest('.record-item');
    const title = record.querySelector('.record-title').textContent;
    const date = record.querySelector('.record-date').textContent;
    const diagnosis = record.querySelector('.record-body p:nth-child(1)')?.textContent.replace('诊断：', '') || '';
    const medication = record.querySelector('.record-body p:nth-child(2)')?.textContent.replace('用药：', '') || '';
    
    const [hospital, department] = title.split(' - ');
    
    document.getElementById('editId').value = id;
    document.getElementById('recordDate').value = date;
    document.getElementById('hospital').value = hospital;
    document.getElementById('department').value = department;
    document.getElementById('diagnosis').value = diagnosis;
    document.getElementById('medication').value = medication;
    
    document.getElementById('formTitle').textContent = '编辑就诊记录';
    document.getElementById('saveBtn').textContent = '更新记录';
    document.getElementById('cancelBtn').classList.remove('hidden');
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
    clearForm();
}

function clearForm() {
    document.getElementById('editId').value = '';
    document.getElementById('recordDate').valueAsDate = new Date();
    document.getElementById('hospital').value = '';
    document.getElementById('department').value = '';
    document.getElementById('diagnosis').value = '';
    document.getElementById('medication').value = '';
    document.getElementById('recordType').value = '门诊';
    document.getElementById('formTitle').textContent = '添加就诊记录';
    document.getElementById('saveBtn').textContent = '保存记录';
    document.getElementById('cancelBtn').classList.add('hidden');
    document.getElementById('formMessage').innerHTML = '';
}

async function deleteRecord(id) {
    if (!confirm('确定要删除这条记录吗？')) return;
    
    const { error } = await supabase
        .from('records')
        .delete()
        .eq('id', id);
    
    if (error) {
        alert('删除失败：' + error.message);
    } else {
        loadRecords();
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 页面加载时检查登录状态
checkAuth();
</script>

</body>
</html>
