<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>康录卡 - 医生查看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 420px; margin: 0 auto; }
    .header { text-align: center; color: white; padding: 30px 0; }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .card { 
      background: white; border-radius: 20px; padding: 24px; 
      margin-bottom: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .card-title { 
      font-size: 18px; font-weight: 600; color: #333; 
      margin-bottom: 16px; padding-bottom: 12px; 
      border-bottom: 2px solid #f0f0f0;
    }
    .info-item { 
      display: flex; justify-content: space-between; 
      padding: 12px 0; border-bottom: 1px solid #f5f5f5;
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: #666; font-size: 14px; }
    .info-value { color: #333; font-weight: 500; font-size: 14px; }
    .record-item { 
      background: #f8f9ff; border-radius: 12px; 
      padding: 16px; margin-bottom: 12px;
      border-left: 4px solid #667eea;
    }
    .record-title { font-weight: 600; color: #333; margin-bottom: 6px; }
    .record-meta { font-size: 13px; color: #999; }
    .tag { 
      display: inline-block; background: #f0f7ff; color: #667eea; 
      padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-right: 8px;
    }
    .badge { 
      display: inline-block; background: #e8f5e9; color: #2c9f7a; 
      padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 16px;
    }
    .error { text-align: center; color: white; padding: 40px 20px; }
    .error h2 { font-size: 20px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏥 康录卡</h1>
      <p>医生查看模式 · 跨院慢病病史整合</p>
    </div>
    <div id="content"></div>
  </div>

  <script>
    function render() {
      const params = new URLSearchParams(window.location.search);
      const data = params.get('data');
      const content = document.getElementById('content');
      
      if (!data) {
        content.innerHTML = `
          <div class="error">
            <h2>⚠️ 无法读取档案</h2>
            <p>二维码链接无效或数据已过期</p>
          </div>`;
        return;
      }
      
      try {
        const user = JSON.parse(decodeURIComponent(atob(data)));
        
        let html = `
          <div style="text-align:center;margin-bottom:20px;">
            <span class="badge">✓ 医生验证通过</span>
          </div>
          <div class="card">
            <div class="card-title">👤 患者基本信息</div>
            <div class="info-item"><span class="info-label">姓名</span><span class="info-value">${user.name || '--'}</span></div>
            <div class="info-item"><span class="info-label">性别</span><span class="info-value">${user.gender || '--'}</span></div>
            <div class="info-item"><span class="info-label">年龄</span><span class="info-value">${user.age || '--'}</span></div>
            <div class="info-item"><span class="info-label">血型</span><span class="info-value">${user.blood || '--'}</span></div>
            <div class="info-item"><span class="info-label">档案ID</span><span class="info-value" style="font-size:12px;">${user.uid || '--'}</span></div>
          </div>
        `;
        
        if (user.diseases && user.diseases.length > 0) {
          html += `
            <div class="card">
              <div class="card-title">🏷️ 慢病标签</div>
              <div>${user.diseases.map(d => `<span class="tag">${d}</span>`).join('')}</div>
            </div>
          `;
        }
        
        if (user.records && user.records.length > 0) {
          html += `
            <div class="card">
              <div class="card-title">📋 就诊记录</div>
              ${user.records.map(r => `
                <div class="record-item">
                  <div class="record-title">${r.title}</div>
                  <div class="record-meta">${r.date} · ${r.hospital} · ${r.type}</div>
                </div>
              `).join('')}
            </div>
          `;
        }
        
        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = `
          <div class="error">
            <h2>⚠️ 数据解析失败</h2>
            <p>二维码数据损坏，请重新生成</p>
          </div>`;
      }
    }
    render();
  </script>
</body>
</html>
